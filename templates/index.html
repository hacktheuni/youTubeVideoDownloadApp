<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>YT Downloader Pro</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0b0c10;
            --surface-color: rgba(20, 20, 30, 0.7);
            --primary-glow: #ff007f;
            --secondary-glow: #00f3ff;
            --text-main: #f5f5f5;
            --text-muted: #888;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 0, 127, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.08), transparent 25%);
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-main);
            overflow: hidden;
        }

        .container {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3rem 4rem;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            text-align: center;
            width: 100%;
            max-width: 600px;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
        }

        p {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 0.5rem;
        }

        label {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--secondary-glow);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input[type="text"], select {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--secondary-glow);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        /* Webkit custom scrollbar for select dropdown */
        select option {
            background-color: var(--bg-color);
            color: white;
        }

        button {
            margin-top: 1rem;
            padding: 1.2rem;
            background: linear-gradient(45deg, var(--primary-glow), var(--secondary-glow));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, var(--secondary-glow), var(--primary-glow));
            z-index: -1;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.5);
        }

        button:hover::before {
            opacity: 1;
        }

        button:active {
            transform: translateY(1px);
        }

        /* Loading state Overlay */
        .loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 12, 16, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .loading.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(0, 243, 255, 0.1);
            border-top-color: var(--secondary-glow);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 1.5rem;
            font-size: 1.5rem;
            color: var(--secondary-glow);
            float: left;
            letter-spacing: 2px;
            animation: pulse 1.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { text-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
            to { text-shadow: 0 0 20px rgba(0, 243, 255, 0.8); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 2rem;
                margin: 1rem;
            }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Downloader Pro</h1>
        <p>Extract Media From Anywhere</p>

        <form action="/downloadVideo" method="get" onsubmit="showLoading()">
            <div class="input-group">
                <label for="videoLink">Target URL</label>
                <input type="text" id="videoLink" name="videoLink" placeholder="https://youtube.com/..." required autocomplete="off">
            </div>

            <div class="input-group">
                <label for="quality">Download Quality</label>
                <select id="quality" name="quality">
                    <option value="best">Best Quality (Default)</option>
                    <option value="1080p">1080p (Full HD)</option>
                    <option value="720p">720p (HD)</option>
                    <option value="480p">480p (SD)</option>
                    <option value="audio">Audio Only (MP3/M4A)</option>
                </select>
            </div>

            <button type="submit">Initialize Download</button>
        </form>
    </div>

    <div class="loading" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">COMMUNICATING WITH SERVERS...</div>
    </div>

    <script>
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('active');
            
            // The loading screen will stay up. When the browser starts downloading the file,
            // the page does not naturally refresh to remove the loading screen. 
            // So we'll set a timeout to remove it, or users can just refresh if needed.
            // A long download can take a couple minutes. We will automatically hide it after 30 seconds
            // just to prevent them from feeling stuck. 
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.remove('active');
            }, 30000); 
        }
    </script>

</body>
</html>
